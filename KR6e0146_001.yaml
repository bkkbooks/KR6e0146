body:
  text: 清浙水慈雲沙門續法集門人如朗較昔藏和尚為不了事事無礙法界旨者設巧方便於一暗室中供五佛像前各然一燈照之取十圓鏡安置十方面面相對影影交涉學者因此悟入剎海涉入重重無盡之旨今亦就此一喻以演賢宗百門初辨時東方第一佛前平旦然燈破暗先照時華嚴會也一近東第二佛傍午然燈破暗初轉阿含會當中第三佛餉午然燈破暗中轉深密會近西第四佛過午然燈破暗後轉妙智會皆名轉照時也二西方第五佛前將晚然燈破暗還照時法華會也三一剎那中頓然五燈即破一室千年之暗現起十方鏡中佛像名為唯約一念四不唯剎那如此在於一日皆然名為盡該一化五現今既爾過未亦然名遍三際六今午現影與昨午明午一同名為攝同類劫七昨晚今早現影與明早作午同名為收異類劫八日日三照不異一念則今一念即攝多日名為以念攝劫九日中有念念既攝日念中有日日復多念念念既不盡日日亦無窮名為劫念重收十一室日念既爾多室日念亦然名為異類界劫十一此一日念彼多日念相攝相入名為彼此攝入十二本非時念依鏡燈故成時成念鏡燈常遍時念常遍名為以本收末十三以上喻通別三時也次敘儀東一鏡燈為本餘方鏡燈為末本影末影始終俱齊名本末門十四分東鏡燈然至西燈名起末門十五攝西光影還於東處名歸本門十六本燈末燈相成無礙名無礙門十七或見一燈或見多燈各隨機便名不定門十八或見此燈不見彼燈或同見彼或不相見名顯密門十九本末一多鏡燈光影一時頓現名頓演門二十一多光影本來虗寂名寂寞門二十一盡前後際鏡燈亦爾名該通門二十二時時交涉處處遍周名無盡門二十三三約教鏡燈佛像從因緣生小教也二十四建立法相唯識所作名立相法相因緣徹底唯空名破相皆始教也二十五雖是徹底唯空不礙藏心緣起終教也二十六雖復幻有宛然不礙真性寂滅頓教也二十七燈光鏡像同時圓遍重重攝入盡成事事無礙法界圓教也二十八四顯宗隨光影相起有無執名法執宗二十九鏡影燈光佛像一一宛然具足名法相宗三十佛佛互現金像各各皆無自性名無相宗三十一即此燈光空而常有名緣起宗三十二即彼鏡影有而常空名寂滅宗三十三五盞燈光參而不雜五尊佛像即而不離鏡現佛燈遍容無盡名圓融宗三十四五明觀先所依體事佛鏡燈光照徹地下穴暗如地獄瞋法界也三十五地中泥暗如餓鬼貪法界也三十六地面磚暗如畜生癡法界也三十七地上瓶盆如修羅慢法界也三十八室中几筵如人戒善法界也三十九室中門屏如天禪定法界也四十室中柱暗如聲聞諦法界也四十一屋上梁暗如支佛緣法界也四十二屋上椽板如菩薩度法界也四十三屋頂瓦窗如諸佛覺法界也四十四鏡燈光影是教有無即離是義教義對也四十五相本幻妄名事性本真實名理理事對也四十六歷緣所對名境發起能觀名智境智對也四十七念念生滅名行前非中後名位行位對也四十八初加然照為因後發光影為果因果對也四十九安處為依鏡佛為正依正對也五十火銅金為體然照容為用體用對也五十一能現鏡燈為人所現光影為法人法對也五十二明顯美好為順暗隱醜惡為逆逆順對也五十三物境來對為感隨順現影為應感應對也五十四次能依觀法光影本虗是名真空絶相觀影像性非斷空名為色非斷空門五十五影像相非真空名為色非真空門五十六影相斷空皆非真空名為色空非空門五十七影相斷空皆即真空名為色即是空門五十八此上四門皆會影像相分歸於真空理性總名會色歸空初句也斷空非影像性名為空非幻色門五十九真空非影像相名為空非實色門六十真空非是斷空影相名為空非空色門六十一真空即是斷空影相名為空即是色門六十二此上四門皆明真空理性即是光影相分總名明空即色次句也光影像相舉體不異真空無性真空無性舉體不異光影像相名為空色無礙門三句也六十三此真空性色空即離迥絶無迹名為泯絶無寄門四句也六十四彼光影像用相與火銅金體性鎔融無礙是名理事無礙觀金該佛鏡全影燈徹光名為理遍於事門六十五佛該金影全鏡光徹燈名為事遍於理門六十六依金鏡燈成佛影光名為依理成事門六十七由佛影光顯金鏡燈名為事能顯理門六十八見金鏡時無像可得名為以理奪事門六十九見光影時亦無燈鏡名為事能隱理門七十其實金鏡即像名為真理即事門七十一而像光即金燈名為事法即理門七十二金鏡燈體非光影相名為真理非事門七十三先影像相非燈鏡體名為事法非理門七十四火銅金既容遍光影像亦容遍是名周遍含容觀火銅金如光影像大小一多顯現差別名為理如事法門七十五光影像如火銅金普遍廣大徹於三世名為事如真理門七十六一燈光一鏡影廣容無量燈光無量鏡影名為事含理事門七十七鏡影燈光不離一處全遍十方名為通局無礙門七十八鏡燈佛像不壞一狹小相能容廣大光影名為廣狹無礙門七十九一光一影遍餘多光影時還能容餘多光多影名為遍容無礙門八十餘多光影攝此一光影時即還入此一光一影名為攝入無礙門八十一一光一影與多光多影不唯能入多一光影亦且能攝多一光影名為交涉無礙門八十二多光多影與一光一影不唯所攝一多光影亦且所入一多光影名為相在無礙門八十三一光影與多光影相即能攝入與所攝入雙融名為普融無礙門八十四一多光影同時頓具名為同時具足相應門八十五遍容無邊光影而不壞本一位名為廣狹自在無礙門八十六一光影中攝多光影多光影中攝一光影名為一多相容不同門八十七此光影容彼光影彼便即此此光影遍彼光影此便即彼名為諸法相即自在門八十八見東鏡燈光影東顯西隱見西鏡燈光影西顯東隱餘方例知名為祕密隱顯俱成門八十九一鏡影中容多光影佛像名為微細相容安立門九十東鏡攝餘八鏡光影帶入西鏡西鏡現於諸鏡光影東西鏡爾餘鏡例然鏡影既爾燈光佛像重現亦然名為因陀羅網境界門九十一見一鏡影即是見於無盡鏡影見一佛光即是見於無盡佛光名為托事顯法生解門九十二一念現爾日月現然歲現若爾劫現亦然年月劫現還同今念名為十世隔法異成門九十三一鏡一燈一佛為主餘多鏡燈佛像為伴名為主伴圓明具德門九十四鏡影燈光佛像是總相九十五一多彼此攝入是別相九十六同一緣起是同相九十七彼此不濫是異相九十八一多合會始成鏡影是成相九十九鏡燈佛像各歸本位是壞相一百此等百門法喻若能諦審觀察則餘十十無盡法門無不豁然而貫通矣
